name: Build and deploy dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: rocker/geospatial:4.5.1
    env:
      RENV_PATHS_ROOT: /github/home/.cache/R/renv
      # Force renv to fetch binary packages for Ubuntu noble (matches rocker/geospatial:4.5.1 base).
      # Without this, renv uses the lockfile's source URL and compiles every package.
      RENV_CONFIG_REPOS_OVERRIDE: https://packagemanager.posit.co/cran/__linux__/noble/latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache renv library
        uses: actions/cache@v4
        with:
          path: /github/home/.cache/R/renv
          key: renv-${{ hashFiles('renv.lock') }}
          restore-keys: |
            renv-

      - name: Restore R packages from renv.lock
        run: |
          Rscript -e 'install.packages("renv", repos = "https://packagemanager.posit.co/cran/__linux__/noble/latest")'
          Rscript -e 'renv::restore(prompt = FALSE)'

      - name: Build dashboard
        run: Rscript "R/00_Report Generation Pipeline.R"

      - name: Verify build output
        run: |
          test -f final_dashboard.html || { echo "ERROR: final_dashboard.html was not produced"; exit 1; }
          echo "Built $(du -h final_dashboard.html | cut -f1) dashboard"

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp final_dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
