<!-- Accessibility Enhancements -->

<!-- Skip Link -->
<a href="#main" class="skip-link">Skip to main content</a>

<style>
/* Screen-reader-only class */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* Skip Link visibility and focus behavior */
.skip-link {
  position: absolute;
  left: -999px;
  top: auto;
  width: 1px;
  height: 1px;
  overflow: hidden;
}
.skip-link:focus {
  left: 1rem;
  top: 1rem;
  background: #000;
  color: #fff;
  padding: 0.5rem 1rem;
  z-index: 1000;
  border-radius: 5px;
}
:focus {
  outline: 3px solid #FFB900;
  outline-offset: 2px;
}

/* Optional: consistent dashboard card styling */
.dashboard-card {
  background-color: #ffffff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  border-radius: 5px;
  padding: 5px;
  margin: 2px 0;
}
.dashboard-card h3 {
  margin-top: 2;
  color: #333333;
  font-family: 'Prompt', sans-serif;
}
</style>

<script>
document.addEventListener("DOMContentLoaded", function(){
  const skipLink = document.querySelector(".skip-link");
  skipLink.addEventListener("click", function(e){
    const target = document.querySelector(this.getAttribute("href"));
    if (target) {
      e.preventDefault();
      target.setAttribute("tabindex", "-1");
      target.focus();
      window.scrollTo({
        top: target.offsetTop,
        behavior: "smooth"
      });
    }
  });
});
</script>
